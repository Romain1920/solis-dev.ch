<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-label="Capture du catalogue Philippe Darioli">
  <defs>
    <linearGradient id="bottle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#160e0c"/>
      <stop offset="0.25" stop-color="#5b3b18"/>
      <stop offset="0.72" stop-color="#865f24"/>
      <stop offset="1" stop-color="#101111"/>
