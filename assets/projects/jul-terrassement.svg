    </filter>
    <filter id="heroShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
  </defs>

  <rect width="1600" height="1000" fill="url(#forest)"/>
  <rect y="646" width="1600" height="354" fill="url(#ground)"/>

  <g opacity="0.55" stroke="#1d211e" stroke-width="6" stroke-linecap="round">
