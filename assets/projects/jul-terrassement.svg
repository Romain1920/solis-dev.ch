    <rect x="452" y="546" width="198" height="154" rx="18" fill="#dadad3"/>
    <rect x="486" y="572" width="104" height="84" rx="10" fill="#1f2d34"/>
    <path d="M318 372 L498 414 L446 518 L252 478 Z" fill="url(#headRed)"/>
    <path d="M192 492 L446 518 L424 570 L150 540 Z" fill="#755540"/>
    <g stroke="#2e241e" stroke-width="7" stroke-linecap="round">
      <path d="M178 536 L154 620"/>
      <path d="M214 538 L194 622"/>
      <path d="M250 540 L234 624"/>
      <path d="M286 542 L274 626"/>
      <path d="M322 544 L316 628"/>
      <path d="M358 546 L360 630"/>
