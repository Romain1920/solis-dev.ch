<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-label="Capture du site Jul Terrassement">
  <defs>
    <linearGradient id="forest" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3c3938"/>
      <stop offset="0.46" stop-color="#74716b"/>
      <stop offset="1" stop-color="#a8aca4"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#322b26"/>
      <stop offset="0.48" stop-color="#7d715f"/>
      <stop offset="1" stop-color="#4c5148"/>
    </linearGradient>
    <linearGradient id="machineBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2e9ad7"/>
      <stop offset="1" stop-color="#0f5684"/>
    </linearGradient>
    <linearGradient id="headRed" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d33a38"/>
      <stop offset="1" stop-color="#7a2621"/>
    </linearGradient>
    <filter id="softBlur">
