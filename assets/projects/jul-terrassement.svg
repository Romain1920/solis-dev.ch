  <g fill="#ffffff" font-family="FK Grotesk, Inter, Helvetica, Arial, sans-serif" text-anchor="middle">
    <text x="800" y="724" font-size="62" font-weight="900" letter-spacing="1.5">JUL TERRASSEMENT</text>
    <text x="800" y="780" font-size="24" font-weight="700">Service de machiniste pour tout terrassement, fouille, aménagement extérieur, enrochement, fauchage, broyage de branches et de souches.</text>
    <rect x="715" y="820" width="170" height="44" rx="22" fill="none" stroke="#ffffff" stroke-width="2"/>
    <text x="800" y="849" font-size="18" font-weight="700">Mes services</text>
    <path d="M784 904 L800 920 L816 904" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
