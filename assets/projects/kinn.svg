<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-label="Capture du projet Kinn">
  <defs>
    <linearGradient id="kinnBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbfa"/>
      <stop offset="0.5" stop-color="#edf4f1"/>
      <stop offset="1" stop-color="#fff7ed"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1815"/>
      <stop offset="1" stop-color="#5f8b78"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="30" stdDeviation="42" flood-color="#13231d" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="1600" height="1000" fill="url(#kinnBg)"/>
  <rect x="88" y="72" width="1424" height="856" rx="38" fill="#ffffff" opacity="0.88"/>
  <g font-family="Inter, Helvetica, Arial, sans-serif" fill="#111614">
    <text x="146" y="146" font-size="30" font-weight="800">Kinn</text>
    <text x="1056" y="146" font-size="18" font-weight="650">App</text>
    <text x="1168" y="146" font-size="18" font-weight="650">Routine</text>
    <text x="1312" y="146" font-size="18" font-weight="650">Journal</text>
    <text x="146" y="346" font-size="78" font-weight="780">Un univers mobile,</text>
    <text x="146" y="430" font-size="78" font-weight="780">naturel et clair.</text>
  </g>
  <text x="150" y="508" fill="#69736f" font-family="Inter, Helvetica, Arial, sans-serif" font-size="28">Application native pour guider les routines, conseiller les soins</text>
  <text x="150" y="550" fill="#69736f" font-family="Inter, Helvetica, Arial, sans-serif" font-size="28">et prolonger la relation avec une experience simple et coherente.</text>
  <g filter="url(#shadow)">
    <rect x="820" y="244" width="510" height="552" rx="38" fill="#f1f6f3"/>
    <rect x="888" y="320" width="176" height="352" rx="42" fill="url(#brand)"/>
    <rect x="932" y="274" width="88" height="78" rx="18" fill="#111614"/>
    <rect x="920" y="462" width="112" height="116" rx="18" fill="#f7fff9" opacity="0.84"/>
    <rect x="1112" y="332" width="148" height="58" rx="29" fill="#ffffff"/>
    <rect x="1112" y="440" width="148" height="18" rx="9" fill="#26352f" opacity="0.72"/>
    <rect x="1112" y="488" width="116" height="18" rx="9" fill="#26352f" opacity="0.42"/>
    <rect x="1112" y="612" width="148" height="46" rx="23" fill="#111614"/>
  </g>
</svg>
