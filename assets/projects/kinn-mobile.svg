<svg xmlns="http://www.w3.org/2000/svg" width="1170" height="2532" viewBox="0 0 1170 2532" role="img" aria-label="Interface mobile Kinn">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbfa"/>
      <stop offset="0.5" stop-color="#edf4f1"/>
      <stop offset="1" stop-color="#fff7ed"/>
    </linearGradient>
    <linearGradient id="bottle" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1815"/>
      <stop offset="1" stop-color="#6d947f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="34" stdDeviation="44" flood-color="#13231d" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="1170" height="2532" fill="url(#bg)"/>
  <g font-family="Inter, Helvetica, Arial, sans-serif">
    <text x="80" y="172" fill="#111614" font-size="48" font-weight="780">Kinn</text>
    <rect x="858" y="120" width="212" height="72" rx="36" fill="#ffffff" opacity="0.84"/>
    <text x="918" y="166" fill="#111614" font-size="25" font-weight="720">Shop</text>
    <text x="80" y="360" fill="#111614" font-size="82" font-weight="780">Votre routine</text>
    <text x="80" y="452" fill="#111614" font-size="82" font-weight="780">au quotidien.</text>
    <text x="84" y="532" fill="#69736f" font-size="32">Un parcours mobile pour choisir,</text>
    <text x="84" y="578" fill="#69736f" font-size="32">commander et suivre ses soins.</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="124" y="736" width="922" height="952" rx="64" fill="#f1f6f3"/>
    <rect x="302" y="924" width="230" height="520" rx="74" fill="url(#bottle)"/>
    <rect x="374" y="838" width="86" height="126" rx="24" fill="#111614"/>
    <rect x="350" y="1148" width="134" height="150" rx="24" fill="#f7fff9" opacity="0.84"/>
    <rect x="642" y="924" width="246" height="82" rx="41" fill="#ffffff"/>
    <rect x="642" y="1082" width="246" height="28" rx="14" fill="#26352f" opacity="0.72"/>
    <rect x="642" y="1154" width="186" height="28" rx="14" fill="#26352f" opacity="0.42"/>
    <rect x="642" y="1382" width="246" height="82" rx="41" fill="#111614"/>
  </g>
  <g font-family="Inter, Helvetica, Arial, sans-serif" filter="url(#shadow)">
    <rect x="96" y="1810" width="978" height="430" rx="58" fill="#ffffff"/>
    <text x="156" y="1908" fill="#737e78" font-size="30" font-weight="650">Routine recommandee</text>
    <text x="156" y="1994" fill="#111614" font-size="54" font-weight="780">Hydratation</text>
    <rect x="156" y="2070" width="208" height="76" rx="38" fill="#eef4f0"/>
    <text x="212" y="2118" fill="#111614" font-size="28" font-weight="760">Matin</text>
    <rect x="390" y="2070" width="208" height="76" rx="38" fill="#111614"/>
    <text x="454" y="2118" fill="#ffffff" font-size="28" font-weight="760">Soir</text>
